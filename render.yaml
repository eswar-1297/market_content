services:
  - type: web
    name: content-guidelines
    runtime: node
    buildCommand: npm install && npm run build && echo "Build complete"
    startCommand: npm start
    nodeVersion: 20.18.0
    disk:
      name: copilot-data
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      # Persist all data on the mounted disk (matches the disk mountPath above).
      - key: DATA_DIR
        value: /opt/render/project/src/server/data
      - key: CFTOOLS_DOCS_URL
        value: https://doc.cftools.live
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "true"
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: GOOGLE_CSE_KEY
        sync: false
      - key: GOOGLE_CSE_CX
        sync: false
      - key: DATAFORSEO_LOGIN
        sync: false
      - key: DATAFORSEO_PASSWORD
        sync: false
      - key: SEMRUSH_API_KEY
        sync: false
      - key: BING_API_KEY
        sync: false
      - key: BRAVE_API_KEY
        sync: false
      - key: ATP_API_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: LANGFUSE_BASE_URL
        sync: false
      - key: COPYLEAKS_EMAIL
        sync: false
      - key: COPYLEAKS_API_KEY
        sync: false
      - key: AUTH_TENANT_ID
        sync: false
      - key: AUTH_CLIENT_ID
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
